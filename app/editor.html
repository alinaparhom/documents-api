<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Редактор документов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
  </head>
  <body>
    <script type="module">
      const API_URL = '../api-docs.php';
      const DRAFT_KEY = 'documents_editor_draft_v1';
      const ROUTE_PAYLOAD_KEY = 'documents_editor_route_payload_v1';

      const EDITOR_LAYOUT_HTML = `
        <div class="app">
          <header class="glass card app__header no-print">
            <div>
              <h1>Документы</h1>
              <p>Загрузите шаблон, отредактируйте и скачайте PDF/DOCX.</p>
            </div>
          </header>

          <section class="glass card controls no-print">
            <label class="field">
              <span>Название документа</span>
              <input type="text" id="docTitle" value="Служебный ответ" maxlength="120" />
            </label>

            <label class="field">
              <span>Свой шаблон (.docx/.pdf до 20MB)</span>
              <input type="file" id="templateFile" accept=".docx,.pdf,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            </label>

            <div class="actions">
              <button id="loadTemplateBtn" class="btn btn-secondary" type="button">Загрузить базовый шаблон</button>
              <button id="saveDraftBtn" class="btn btn-secondary" type="button">Сохранить черновик</button>
              <button id="loadDraftBtn" class="btn btn-secondary" type="button">Восстановить черновик</button>
            </div>

            <div class="actions actions--primary">
              <button id="downloadPdfBtn" class="btn btn-primary" type="button">Скачать PDF</button>
              <button id="downloadDocxBtn" class="btn btn-primary" type="button">Скачать DOCX</button>
              <button id="printBtn" class="btn" type="button">Печать</button>
            </div>
          </section>

          <section class="glass card editor-card">
            <div id="editorHost" class="editor-host" contenteditable="true"></div>
          </section>

          <p id="status" class="status no-print" aria-live="polite"></p>
        </div>
      `;

      const EDITOR_LAYOUT_CSS = `
        :root {
          --bg: linear-gradient(180deg, #f9fbff 0%, #edf3ff 100%);
          --card: rgba(255, 255, 255, 0.74);
          --line: rgba(255, 255, 255, 0.7);
          --text: #132238;
          --muted: #5c6f86;
          --accent: #3b82f6;
          --accent-2: #1d4ed8;
          --shadow: 0 12px 30px rgba(21, 53, 93, 0.12);
        }

        * { box-sizing: border-box; }
        body {
          margin: 0;
          color: var(--text);
          font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: var(--bg);
          min-height: 100dvh;
        }

        .app {
          width: min(100%, 920px);
          margin: 0 auto;
          padding: 12px 12px calc(24px + env(safe-area-inset-bottom));
          display: grid;
          gap: 12px;
        }

        .glass {
          background: var(--card);
          border: 1px solid var(--line);
          border-radius: 16px;
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          box-shadow: var(--shadow);
        }

        .card { padding: 12px; }
        .app__header h1 { margin: 0; font-size: 22px; }
        .app__header p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

        .controls { display: grid; gap: 10px; }
        .field { display: grid; gap: 6px; font-size: 13px; color: var(--muted); }
        .field input[type='text'],
        .field input[type='file'] {
          width: 100%;
          border: 1px solid #d8e4f7;
          border-radius: 12px;
          min-height: 44px;
          padding: 10px 12px;
          font-size: 15px;
          background: rgba(255, 255, 255, 0.9);
        }

        .actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn {
          min-height: 44px;
          border-radius: 12px;
          border: 1px solid #dbe7fb;
          background: #fff;
          color: var(--text);
          font-size: 14px;
          font-weight: 600;
          padding: 10px 12px;
        }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:active { background: var(--accent-2); }
        .btn-secondary { background: rgba(255, 255, 255, 0.92); }

        .editor-card { padding: 0; overflow: hidden; }
        .editor-host {
          min-height: 68dvh;
          padding: 14px;
          font-size: 16px;
          line-height: 1.45;
          background: #fff;
        }
        .editor-host:focus { outline: none; }

        .tox-tinymce {
          border: 0 !important;
          border-radius: 16px !important;
          min-height: 68dvh;
        }

        .status {
          margin: 0;
          font-size: 13px;
          color: var(--muted);
          text-align: center;
        }

        @media (min-width: 760px) {
          .actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }

        @media print {
          .no-print,
          .tox-editor-header,
          .tox-statusbar { display: none !important; }
          .app { max-width: none; padding: 0; }
          .glass, .card { box-shadow: none; border: 0; background: #fff; }
          @page { size: A4; margin: 12mm; }
          body { background: #fff; }
        }
      `;

      function mountEditorLayout() {
        const styleNode = document.createElement('style');
        styleNode.textContent = EDITOR_LAYOUT_CSS;
        document.head.appendChild(styleNode);
        document.body.innerHTML = EDITOR_LAYOUT_HTML;
      }

      mountEditorLayout();

      const elements = {
        title: document.getElementById('docTitle'),
        templateFile: document.getElementById('templateFile'),
        loadTemplateBtn: document.getElementById('loadTemplateBtn'),
        saveDraftBtn: document.getElementById('saveDraftBtn'),
        loadDraftBtn: document.getElementById('loadDraftBtn'),
        downloadPdfBtn: document.getElementById('downloadPdfBtn'),
        downloadDocxBtn: document.getElementById('downloadDocxBtn'),
        printBtn: document.getElementById('printBtn'),
        editorHost: document.getElementById('editorHost'),
        status: document.getElementById('status'),
      };

      let tinyInstance = null;

      function setStatus(text, isError = false) {
        elements.status.textContent = text;
        elements.status.style.color = isError ? '#b42318' : '#5c6f86';
      }

      function consumeRoutePayload() {
        let raw = '';
        try {
          raw = localStorage.getItem(ROUTE_PAYLOAD_KEY) || '';
        } catch (error) {
          return null;
        }
        if (!raw) return null;
        try {
          localStorage.removeItem(ROUTE_PAYLOAD_KEY);
        } catch (error) {}
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : null;
        } catch (error) {
          return null;
        }
      }

      function getEditorHtml() {
        return tinyInstance ? (tinyInstance.getContent() || '') : (elements.editorHost.innerHTML || '');
      }

      function setEditorHtml(html) {
        if (tinyInstance) {
          tinyInstance.setContent(html || '<p></p>');
          return;
        }
        elements.editorHost.innerHTML = html || '<p></p>';
      }

      async function initEditor() {
        if (!window.tinymce || typeof window.tinymce.init !== 'function') {
          setStatus('TinyMCE недоступен, включён простой режим редактирования.');
          return;
        }
        try {
          const result = await window.tinymce.init({
            target: elements.editorHost,
            menubar: false,
            branding: false,
            mobile: { menubar: false },
            plugins: 'lists table link autoresize',
            toolbar: 'undo redo | bold italic underline | bullist numlist | table | alignleft aligncenter alignright',
            content_style: 'body{font-family:Inter,sans-serif;font-size:16px;line-height:1.45;padding:8px;}',
            min_height: Math.max(window.innerHeight * 0.55, 380),
          });
          tinyInstance = result && result[0] ? result[0] : null;
        } catch (error) {
          setStatus('Не удалось запустить визуальный редактор. Работает простой режим.', true);
        }
      }

      async function loadBaseTemplate() {
        setStatus('Загружаю шаблон...');
        const formData = new FormData();
        formData.append('action', 'load_template_html');
        const response = await fetch(API_URL, { method: 'POST', body: formData });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || 'Ошибка загрузки шаблона');
        setEditorHtml(payload.html || '<p>Шаблон пустой</p>');
        setStatus('Шаблон загружен.');
      }

      function saveDraft() {
        const data = { title: elements.title.value.trim(), html: getEditorHtml(), savedAt: new Date().toISOString() };
        localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
        setStatus('Черновик сохранён на устройстве.');
      }

      function loadDraft() {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) {
          setStatus('Черновик не найден.', true);
          return;
        }
        try {
          const data = JSON.parse(raw);
          if (typeof data.title === 'string') elements.title.value = data.title;
          if (typeof data.html === 'string') setEditorHtml(data.html);
          setStatus('Черновик восстановлен.');
        } catch (error) {
          setStatus('Не удалось прочитать черновик.', true);
        }
      }

      async function downloadDocument(format) {
        const html = getEditorHtml().trim();
        if (!html) {
          setStatus('Сначала заполните документ.', true);
          return;
        }

        const formData = new FormData();
        const selectedTemplate = elements.templateFile.files && elements.templateFile.files[0] ? elements.templateFile.files[0] : null;
        if (selectedTemplate && selectedTemplate.size > 20 * 1024 * 1024) {
          setStatus('Шаблон больше 20MB. Выберите файл меньше.', true);
          return;
        }

        formData.append('action', selectedTemplate ? 'generate_from_html' : 'generate_from_editor');
        formData.append('format', format);
        formData.append('html', html);
        formData.append('documentTitle', elements.title.value.trim() || 'Документ');
        if (selectedTemplate) formData.append('templateFile', selectedTemplate);

        setStatus(`Готовлю ${format.toUpperCase()}...`);
        const response = await fetch(API_URL, { method: 'POST', body: formData });

        if (!response.ok) {
          let message = `Ошибка генерации ${format.toUpperCase()}`;
          try {
            const payload = await response.json();
            if (payload && payload.error) message = payload.error;
          } catch (error) {}
          throw new Error(message);
        }

        const blob = await response.blob();
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        const safeName = (elements.title.value.trim() || 'document').replace(/[^\p{L}\p{N}_-]+/gu, '_');
        link.href = url;
        link.download = `${safeName}.${format === 'pdf' ? 'pdf' : 'docx'}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus(`${format.toUpperCase()} готов.`);
      }

      function initTelegramMiniApp() {
        if (!window.Telegram || !window.Telegram.WebApp) return;
        const app = window.Telegram.WebApp;
        app.ready();
        app.expand();
      }

      function bindEvents() {
        elements.loadTemplateBtn.addEventListener('click', () => {
          loadBaseTemplate().catch((error) => setStatus(error.message || 'Ошибка шаблона', true));
        });
        elements.saveDraftBtn.addEventListener('click', saveDraft);
        elements.loadDraftBtn.addEventListener('click', loadDraft);
        elements.downloadPdfBtn.addEventListener('click', () => {
          downloadDocument('pdf').catch((error) => setStatus(error.message || 'Ошибка PDF', true));
        });
        elements.downloadDocxBtn.addEventListener('click', () => {
          downloadDocument('docx').catch((error) => setStatus(error.message || 'Ошибка DOCX', true));
        });
        elements.printBtn.addEventListener('click', () => window.print());
      }

      (async function bootstrap() {
        initTelegramMiniApp();
        bindEvents();
        await initEditor();

        const routePayload = consumeRoutePayload();
        if (routePayload && typeof routePayload === 'object') {
          if (typeof routePayload.title === 'string' && routePayload.title.trim()) {
            elements.title.value = routePayload.title.trim();
          }
          if (typeof routePayload.html === 'string' && routePayload.html.trim()) {
            setEditorHtml(routePayload.html);
            setStatus('Черновик получен из окна редактирования шаблона.');
            return;
          }
        }

        loadDraft();
      })();
    </script>
  </body>
</html>
