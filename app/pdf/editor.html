<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>WYSIWYG редактор шаблона</title>
    <style>
      :root {
        --bg: #eef3ff;
        --glass: rgba(255, 255, 255, 0.78);
        --glass-strong: rgba(255, 255, 255, 0.94);
        --border: rgba(102, 130, 210, 0.25);
        --text: #1c2644;
        --muted: #66739a;
        --brand: #4b7cff;
        --brand-2: #77a0ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 0 0, #fff 0%, var(--bg) 55%, #e5ecff 100%);
        min-height: 100dvh;
        padding: calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
      }
      .layout { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 12px; }
      .card {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 18px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 10px 28px rgba(44, 72, 142, 0.12);
      }
      .controls { padding: 12px; }
      .controls h1 { margin: 0; font-size: 1.08rem; }
      .sub { margin: 6px 0 10px; color: var(--muted); font-size: .88rem; }
      .field { margin-bottom: 8px; }
      .field label { display: block; margin-bottom: 5px; color: var(--muted); font-size: .82rem; }
      input, select {
        width: 100%; border: 1px solid var(--border); border-radius: 11px;
        padding: 10px 12px; font-size: .94rem; background: var(--glass-strong); color: var(--text);
      }
      .row { display: grid; grid-template-columns: 1fr; gap: 8px; }
      .toolbar {
        display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px;
        padding: 8px; border: 1px solid var(--border); border-radius: 12px; background: var(--glass-strong);
      }
      .tool-btn {
        border: 0; border-radius: 10px; min-height: 34px; font-weight: 600; cursor: pointer;
        background: rgba(75, 124, 255, .13); color: #2447b7;
      }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .btn {
        border: 0; border-radius: 12px; min-height: 38px; padding: 10px 12px; font-weight: 700; cursor: pointer;
      }
      .btn-main { color: #fff; background: linear-gradient(145deg, var(--brand), var(--brand-2)); }
      .btn-ghost { color: #2f57ce; background: rgba(75, 124, 255, .13); }
      .status { margin-top: 8px; min-height: 18px; color: var(--muted); font-size: .83rem; }
      .status.ok { color: #1b8a57; }
      .status.error { color: #d83f67; }

      .sheet-wrap { padding: 10px; }
      .sheet {
        width: 100%; max-width: 210mm; min-height: 297mm; margin: 0 auto;
        background: #fff; color: #101010; border-radius: 8px;
        box-shadow: 0 0 1px rgba(0,0,0,.4), 0 12px 26px rgba(0,0,0,.1);
        padding: 16mm 14mm;
      }
      .sheet-head { text-align: center; border-bottom: 1px solid #dbe2f2; padding-bottom: 8px; }
      .sheet-title { text-align: center; margin: 14px 0; font-size: 1.18rem; font-weight: 700; }
      .sheet-body {
        border: 1px dashed #c5d0ec; border-radius: 8px; min-height: 220px; padding: 10px;
        line-height: 1.55; outline: none;
      }
      .sheet-body:focus { border-color: #7a9fff; box-shadow: 0 0 0 3px rgba(76, 124, 255, .12); }
      .sheet-sign { margin-top: 34px; display: flex; justify-content: space-between; gap: 10px; }
      .sign-line { border-top: 1px solid #222; min-width: 190px; text-align: center; padding-top: 4px; }

      @media (min-width: 1000px) {
        .layout { grid-template-columns: minmax(320px, 390px) 1fr; }
        .controls { position: sticky; top: 10px; align-self: start; }
        .row { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="card controls">
        <h1>WYSIWYG редактор шаблона</h1>
        <p class="sub">Редактируйте текст прямо в документе справа — это и есть финальный вид файла.</p>

        <div class="field">
          <label for="company">Компания</label>
          <input id="company" maxlength="120" value='ОАО "Амкодор"' />
        </div>

        <div class="row">
          <div class="field">
            <label for="docDate">Дата</label>
            <input id="docDate" type="date" />
          </div>
          <div class="field">
            <label for="format">Формат</label>
            <select id="format">
              <option value="pdf">PDF</option>
              <option value="doc">Word (.doc)</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="title">Заголовок</label>
          <input id="title" maxlength="120" value="Служебная записка" />
        </div>

        <div class="field">
          <label for="signatory">Подписант</label>
          <input id="signatory" maxlength="120" value="Иванов И.И." />
        </div>

        <div class="field">
          <label>Панель форматирования</label>
          <div class="toolbar" id="toolbar">
            <button class="tool-btn" type="button" data-cmd="bold"><b>B</b></button>
            <button class="tool-btn" type="button" data-cmd="italic"><i>I</i></button>
            <button class="tool-btn" type="button" data-cmd="underline"><u>U</u></button>
            <button class="tool-btn" type="button" data-cmd="removeFormat">Очистить</button>
            <button class="tool-btn" type="button" data-cmd="insertUnorderedList">• Список</button>
            <button class="tool-btn" type="button" data-cmd="insertOrderedList">1. Список</button>
            <button class="tool-btn" type="button" data-cmd="justifyLeft">← Лево</button>
            <button class="tool-btn" type="button" data-cmd="justifyCenter">↔ Центр</button>
          </div>
        </div>

        <div class="actions">
          <button id="download" class="btn btn-main" type="button">Скачать</button>
          <button id="reset" class="btn btn-ghost" type="button">Сбросить</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section class="card sheet-wrap">
        <article id="sheet" class="sheet">
          <header class="sheet-head">
            <strong id="vCompany">ОАО "Амкодор"</strong><br />
            <small id="vDate"></small>
          </header>
          <div id="vTitle" class="sheet-title">Служебная записка</div>
          <div id="editorBody" class="sheet-body" contenteditable="true">
            <p>Введите текст документа здесь. Можно выделять текст и форматировать через панель.</p>
          </div>
          <footer class="sheet-sign">
            <div>Ответственный:</div>
            <div id="vSignatory" class="sign-line">Иванов И.И.</div>
          </footer>
        </article>
      </section>
    </div>

    <script>
      const form = {
        company: document.getElementById('company'),
        docDate: document.getElementById('docDate'),
        title: document.getElementById('title'),
        signatory: document.getElementById('signatory'),
        format: document.getElementById('format')
      };
      const view = {
        company: document.getElementById('vCompany'),
        date: document.getElementById('vDate'),
        title: document.getElementById('vTitle'),
        signatory: document.getElementById('vSignatory')
      };

      const toolbar = document.getElementById('toolbar');
      const editorBody = document.getElementById('editorBody');
      const sheet = document.getElementById('sheet');
      const status = document.getElementById('status');
      const downloadBtn = document.getElementById('download');
      const resetBtn = document.getElementById('reset');
      const exportUrl = new URL('./save-document.php', window.location.href).toString();

      const defaults = {
        company: 'ОАО "Амкодор"',
        title: 'Служебная записка',
        signatory: 'Иванов И.И.',
        bodyHtml: '<p>Введите текст документа здесь. Можно выделять текст и форматировать через панель.</p>',
        format: 'pdf'
      };

      const humanDate = (isoDate) => {
        if (!isoDate) return 'Дата не указана';
        const dt = new Date(`${isoDate}T00:00:00`);
        if (Number.isNaN(dt.getTime())) return 'Дата не указана';
        return dt.toLocaleDateString('ru-RU');
      };

      const showStatus = (text, type = '') => {
        status.textContent = text;
        status.className = `status ${type}`.trim();
      };

      const syncMeta = () => {
        view.company.textContent = form.company.value.trim() || 'Компания';
        view.date.textContent = humanDate(form.docDate.value);
        view.title.textContent = form.title.value.trim() || 'Без названия';
        view.signatory.textContent = form.signatory.value.trim() || 'Подпись';
      };

      const buildFileName = () => {
        const raw = (form.title.value || 'document').trim();
        const safe = raw.replace(/[^a-zA-Zа-яА-Я0-9-_ ]/g, '').trim();
        return safe || 'document';
      };

      const createExportHtml = () => {
        syncMeta();
        return `<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8" /><title>${view.title.textContent}</title></head><body>${sheet.outerHTML}</body></html>`;
      };

      const toggleBusy = (isBusy) => {
        downloadBtn.disabled = isBusy;
        resetBtn.disabled = isBusy;
      };

      const downloadFile = async () => {
        if (!editorBody.textContent.trim()) {
          showStatus('Добавьте текст в тело документа.', 'error');
          editorBody.focus();
          return;
        }

        showStatus('Подготавливаем документ...');
        toggleBusy(true);

        const payload = {
          html: createExportHtml(),
          fileName: buildFileName(),
          format: form.format.value
        };

        try {
          const response = await fetch(exportUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || 'Ошибка сервера');
          }
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${payload.fileName}.${payload.format}`;
          a.click();
          URL.revokeObjectURL(url);
          showStatus('Готово: документ скачан.', 'ok');
        } catch (error) {
          showStatus(`Ошибка: ${error.message}`, 'error');
        } finally {
          toggleBusy(false);
        }
      };

      const setToday = () => {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        form.docDate.value = `${y}-${m}-${day}`;
      };

      const resetAll = () => {
        form.company.value = defaults.company;
        form.title.value = defaults.title;
        form.signatory.value = defaults.signatory;
        form.format.value = defaults.format;
        editorBody.innerHTML = defaults.bodyHtml;
        setToday();
        syncMeta();
        showStatus('Шаблон сброшен.');
      };

      toolbar.addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-cmd]');
        if (!btn) return;
        const command = btn.dataset.cmd;
        editorBody.focus();
        document.execCommand(command, false, null);
      });

      [form.company, form.docDate, form.title, form.signatory].forEach((input) => {
        input.addEventListener('input', syncMeta);
      });
      downloadBtn.addEventListener('click', downloadFile);
      resetBtn.addEventListener('click', resetAll);

      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }

      resetAll();
    </script>
  </body>
</html>
